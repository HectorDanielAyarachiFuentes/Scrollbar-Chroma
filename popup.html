<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrollbar Reimagined</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>Scrollbar<br><span>Premium</span></h1>
            </div>
            <label class="switch">
                <input type="checkbox" id="toggle-extension" checked>
                <span class="slider round"></span>
            </label>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="basic">Básico</button>
            <button class="tab-btn" data-tab="advanced">Avanzado</button>
        </div>

        <div class="content tab-content active" id="tab-basic">
            <div class="card">
                <div class="card-header">
                    <h2>Apariencia</h2>
                </div>
                <div class="themes">
                    <button class="theme-btn active" data-theme="purple" style="--t-color-1: #a855f7; --t-color-2: #3b82f6;">
                        <span class="theme-preview"></span>
                        <span class="theme-name">Galaxia</span>
                    </button>
                    <button class="theme-btn" data-theme="sunset" style="--t-color-1: #f97316; --t-color-2: #eab308;">
                        <span class="theme-preview"></span>
                        <span class="theme-name">Atardecer</span>
                    </button>
                    <button class="theme-btn" data-theme="emerald" style="--t-color-1: #10b981; --t-color-2: #06b6d4;">
                        <span class="theme-preview"></span>
                        <span class="theme-name">Esmeralda</span>
                    </button>
                    <button class="theme-btn" data-theme="ruby" style="--t-color-1: #ef4444; --t-color-2: #ec4899;">
                        <span class="theme-preview"></span>
                        <span class="theme-name">Rubí</span>
                    </button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Integración con Navegador</h2>
                </div>
                <div class="options">
                    <div class="option-item">
                        <span>Sincronizar colores (Firefox)</span>
                        <label class="switch small">
                            <input type="checkbox" id="toggle-sync">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Opciones</h2>
                </div>
                <div class="options">
                    <div class="option-item">
                        <span>Mostrar texto "NAV"</span>
                        <label class="switch small">
                            <input type="checkbox" id="toggle-text" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="content tab-content" id="tab-advanced">
            <div class="card">
                <div class="card-header">
                    <h2>Modo Avanzado</h2>
                </div>
                <div class="options">
                    <div class="option-item">
                        <span>Habilitar colores manuales</span>
                        <label class="switch small">
                            <input type="checkbox" id="toggle-advanced-colors">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="card" id="advanced-colors-card" style="opacity: 0.5; pointer-events: none;">
                <div class="card-header">
                    <h2>Colores Personalizados</h2>
                </div>
                <div class="options">
                    <div class="option-item">
                        <span>Fondo de la barra (Track)</span>
                        <input type="color" id="track-color" value="#141418">
                    </div>
                    <div class="option-item">
                        <span>Deslizador (Thumb 1)</span>
                        <input type="color" id="thumb-color-1" value="#a855f7">
                    </div>
                    <div class="option-item">
                        <span>Deslizador (Thumb 2)</span>
                        <input type="color" id="thumb-color-2" value="#3b82f6">
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <div style="display: flex; gap: 8px;">
                <a href="#" id="open-window" style="text-decoration: none; font-size: 14px; cursor: pointer; filter: grayscale(100%); transition: 0.2s;" title="Abrir en ventana flotante" onmouseover="this.style.filter='none'" onmouseout="this.style.filter='grayscale(100%)'">🪟</a>
                <a href="#" id="open-sidebar" style="text-decoration: none; font-size: 14px; cursor: pointer; filter: grayscale(100%); transition: 0.2s;" title="Abrir en panel lateral" onmouseover="this.style.filter='none'" onmouseout="this.style.filter='grayscale(100%)'">🗂️</a>
            </div>
            <p style="margin-left: -15px;">Scrollbar Reimagined &copy; 2026</p>
            <p class="status" id="status-message">Activo</p>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
